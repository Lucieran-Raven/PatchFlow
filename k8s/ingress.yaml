apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-ingress
  namespace: patchflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
  - hosts:
    - patchflow.io
    - www.patchflow.io
    - api.patchflow.io
    secretName: patchflow-tls
  rules:
  - host: patchflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-frontend
            port:
              number: 3000
  - host: www.patchflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-frontend
            port:
              number: 3000
  - host: api.patchflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-backend
            port:
              number: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: patchflow-network-policy
  namespace: patchflow
spec:
  podSelector:
    matchLabels:
      app: patchflow-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: patchflow-frontend
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patchflow-backend-pdb
  namespace: patchflow
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: patchflow-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patchflow-frontend-pdb
  namespace: patchflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: patchflow-frontend
