apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: patchflow

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap.yaml
  - ../../base/backend.yaml
  - ../../base/frontend.yaml

patchesStrategicMerge:
  - backend-patch.yaml
  - frontend-patch.yaml

images:
  - name: patchflow/backend
    newTag: staging
  - name: patchflow/frontend
    newTag: staging
