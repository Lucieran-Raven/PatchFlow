apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchflow-frontend
  namespace: patchflow
spec:
  replicas: 5
  template:
    spec:
      containers:
      - name: frontend
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
