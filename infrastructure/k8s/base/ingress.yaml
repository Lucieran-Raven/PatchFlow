apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-ingress
  namespace: patchflow
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      deletion_protection.enabled=true,
      routing.http2.enabled=true,
      idle_timeout.timeout_seconds=60
    external-dns.alpha.kubernetes.io/hostname: "app.patchflow.ai,api.patchflow.ai"
spec:
  ingressClassName: alb
  tls:
  - hosts:
    - app.patchflow.ai
    - api.patchflow.ai
    secretName: patchflow-tls-cert
  rules:
  - host: app.patchflow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-frontend
            port:
              number: 3000
  - host: api.patchflow.ai
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: patchflow-backend
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: patchflow-backend
            port:
              number: 8000
      - path: /openapi.json
        pathType: Exact
        backend:
          service:
            name: patchflow-backend
            port:
              number: 8000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: patchflow-tls
  namespace: patchflow
spec:
  secretName: patchflow-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - app.patchflow.ai
  - api.patchflow.ai
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-internal-ingress
  namespace: patchflow-agents
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    external-dns.alpha.kubernetes.io/hostname: "agents.patchflow.internal"
spec:
  ingressClassName: alb
  tls:
  - hosts:
    - agents.patchflow.internal
    secretName: agents-tls-cert
  rules:
  - host: agents.patchflow.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator
            port:
              number: 8080
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agents-tls
  namespace: patchflow-agents
spec:
  secretName: agents-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - agents.patchflow.internal
