apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-ingress
  namespace: patchflow
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      deletion_protection.enabled=true,
      routing.http2.enabled=true,
      idle_timeout.timeout_seconds=60
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:ACCOUNT_ID:regional/webacl/patchflow-acl/ACL_ID
spec:
  rules:
  - host: app.patchflow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-frontend
            port:
              number: 80
  - host: api.patchflow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: patchflow-backend
            port:
              number: 80
---
# Internal ingress for agent communication
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-internal-ingress
  namespace: patchflow-agents
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID
spec:
  rules:
  - host: agents.patchflow.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator
            port:
              number: 8080
