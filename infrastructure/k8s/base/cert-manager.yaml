# =============================================================================
# Cert Manager - Let's Encrypt ClusterIssuer
# =============================================================================
# This creates a Cluster-wide certificate issuer using Let's Encrypt
# Requires: cert-manager Helm chart already deployed
# =============================================================================

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@patchflow.ai
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - selector:
        dnsZones:
        - patchflow.ai
      dns01:
        route53:
          region: us-east-1
          # Uses IRSA role attached to cert-manager service account
---
# Staging issuer for testing (rate limits are higher)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@patchflow.ai
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - selector:
        dnsZones:
        - patchflow.ai
      dns01:
        route53:
          region: us-east-1
