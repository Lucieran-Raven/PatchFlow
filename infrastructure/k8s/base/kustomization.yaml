# =============================================================================
# PatchFlow - Base Kustomization
# =============================================================================
# Base Kubernetes manifests for all environments
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - cert-manager.yaml

commonLabels:
  app.kubernetes.io/part-of: patchflow
  app.kubernetes.io/managed-by: kustomize
