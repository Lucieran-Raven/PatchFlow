apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchflow-frontend
  namespace: patchflow
  labels:
    app: patchflow-frontend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: patchflow-frontend
  template:
    metadata:
      labels:
        app: patchflow-frontend
        version: v1
    spec:
      serviceAccountName: patchflow-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: frontend
        image: patchflow/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.patchflow.ai"
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://api.patchflow.ai"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: patchflow-frontend
  namespace: patchflow
  labels:
    app: patchflow-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: patchflow-frontend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchflow-frontend
  namespace: patchflow
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patchflow-frontend
  namespace: patchflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patchflow-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
