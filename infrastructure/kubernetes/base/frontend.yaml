apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchflow-frontend
  labels:
    app: patchflow
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patchflow
      component: frontend
  template:
    metadata:
      labels:
        app: patchflow
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/lucieran-raven/patchflow/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.patchflow.ai"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: patchflow-frontend
  labels:
    app: patchflow
    component: frontend
spec:
  selector:
    app: patchflow
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchflow-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - patchflow.ai
        - api.patchflow.ai
      secretName: patchflow-tls
  rules:
    - host: patchflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: patchflow-frontend
                port:
                  number: 80
    - host: api.patchflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: patchflow-backend
                port:
                  number: 80
