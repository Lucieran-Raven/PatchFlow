apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchflow-backend
  labels:
    app: patchflow
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: patchflow
      component: backend
  template:
    metadata:
      labels:
        app: patchflow
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/lucieran-raven/patchflow/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: patchflow-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: patchflow-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: patchflow-secrets
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: patchflow-backend
  labels:
    app: patchflow
    component: backend
spec:
  selector:
    app: patchflow
    component: backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
